<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>디지털 인문학 미래 예측</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #111111;
      --accent: #111111;
      --panel: rgba(255, 255, 255, 0.08);
      --line: rgba(255, 255, 255, 0.25);
      --ease: cubic-bezier(0.7, 0, 0.3, 1);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: Pretendard, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
    }

    body {
      display: grid;
      place-items: center;
      transition: background 900ms var(--ease), color 500ms ease;
    }

    button {
      font: inherit;
      cursor: pointer;
      border: 0;
    }

    .hidden {
      opacity: 0 !important;
      pointer-events: none !important;
      transform: translateY(16px) scale(0.98) !important;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      isolation: isolate;
    }

    .home {
      position: relative;
      z-index: 3;
      width: min(92vw, 920px);
      text-align: center;
      transition: opacity 600ms ease, transform 600ms ease;
    }

    .home h1 {
      margin: 0 0 36px;
      font-size: clamp(2.4rem, 8vw, 6.8rem);
      line-height: 1.05;
      letter-spacing: -0.06em;
      word-break: keep-all;
    }

    .start-btn {
      min-width: 168px;
      min-height: 68px;
      padding: 18px 44px;
      border-radius: 999px;
      background: #000;
      color: #fff;
      font-size: clamp(1rem, 2vw, 1.35rem);
      transition: transform 1500ms var(--ease), border-radius 800ms var(--ease), opacity 500ms ease;
      will-change: transform;
    }

    .start-btn.expand {
      transform: scale(90);
      border-radius: 0;
      pointer-events: none;
    }

    .stage {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: grid;
      place-items: center;
      padding: 40px 24px;
      color: #fff;
      text-align: center;
      pointer-events: none;
    }

    .stage.active { pointer-events: auto; }

    .text-box {
      width: min(92vw, 980px);
      min-height: 1.4em;
      font-size: clamp(1.8rem, 4.2vw, 4.2rem);
      line-height: 1.35;
      font-weight: 750;
      letter-spacing: -0.04em;
      word-break: keep-all;
      white-space: pre-line;
      text-shadow: 0 10px 34px rgba(0, 0, 0, 0.45);
      transition: opacity 700ms ease, transform 700ms ease;
    }

    .sub-text {
      margin-top: 18px;
      color: rgba(255, 255, 255, 0.72);
      font-size: clamp(0.98rem, 1.8vw, 1.25rem);
      line-height: 1.7;
      word-break: keep-all;
      white-space: pre-line;
    }

    .choice-row,
    .answer-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 34px;
    }

    .choice-btn,
    .answer-btn {
      min-width: 138px;
      padding: 16px 28px;
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 999px;
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      transition: opacity 500ms ease, transform 500ms ease, background 300ms ease, border-color 300ms ease;
    }

    .choice-btn:hover,
    .answer-btn:hover {
      transform: translateY(-4px);
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.9);
    }

    .current-image,
    .future-image {
      width: min(88vw, 900px);
      height: min(46vh, 420px);
      margin: 0 auto 28px;
      border-radius: 28px;
      background-size: cover;
      background-position: center;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
      transition: opacity 700ms ease, transform 700ms ease;
    }

    .future-list {
      position: fixed;
      inset: 0;
      z-index: 8;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: clamp(18px, 3vw, 36px);
      align-items: center;
      padding: clamp(22px, 4vw, 58px);
      color: #fff;
      pointer-events: none;
      opacity: 0;
      transform: translateY(22px);
      transition: opacity 700ms ease, transform 700ms ease;
    }

    .future-list.active {
      pointer-events: auto;
      opacity: 1;
      transform: translateY(0);
    }

    .future-title {
      width: min(1100px, 94vw);
      margin: 0 auto;
      text-align: center;
    }

    .future-title h2 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 5vw, 4.8rem);
      line-height: 1.05;
      letter-spacing: -0.06em;
    }

    .future-title p {
      margin: 0 auto;
      max-width: 720px;
      color: rgba(255, 255, 255, 0.68);
      font-size: clamp(1rem, 1.6vw, 1.16rem);
      line-height: 1.65;
      word-break: keep-all;
    }

    /* 영화 선택 버튼: 세로로 길쭉한 스틸컷 카드 */
    .future-buttons {
      width: min(1240px, 94vw);
      height: min(64vh, 650px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(5, minmax(150px, 1fr));
      gap: clamp(18px, 2vw, 30px);
      align-items: stretch;
      perspective: 1200px;
    }

    .future-btn {
      --item-color: #555;
      position: relative;
      height: 100%;
      min-height: 450px;
      padding: 0;
      overflow: hidden;
      border: 2px solid color-mix(in srgb, var(--item-color), #ffffff 18%);
      border-radius: 30px;
      text-align: left;
      color: #fff;
      background:
        linear-gradient(180deg,
          color-mix(in srgb, var(--item-color), #ffffff 16%) 0%,
          color-mix(in srgb, var(--item-color), #000000 34%) 48%,
          #050505 100%);
      box-shadow:
        0 24px 60px rgba(0, 0, 0, 0.42),
        0 0 34px color-mix(in srgb, var(--item-color), transparent 58%);
      transition:
        transform 480ms var(--ease),
        border-color 300ms ease,
        box-shadow 300ms ease,
        filter 300ms ease;
    }

    .future-btn::before {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 22px;
      background-image:
        linear-gradient(180deg, rgba(0, 0, 0, 0.04) 0%, rgba(0, 0, 0, 0.12) 46%, rgba(0, 0, 0, 0.72) 100%),
        var(--thumb),
        linear-gradient(135deg, var(--item-color), #111);
      background-size: cover;
      background-position: center;
      transform: scale(1);
      transition: transform 520ms var(--ease), filter 300ms ease;
    }

    .future-btn::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        linear-gradient(90deg, color-mix(in srgb, var(--item-color), transparent 20%), transparent 26%, transparent 74%, color-mix(in srgb, var(--item-color), transparent 20%)),
        radial-gradient(circle at 50% 12%, color-mix(in srgb, var(--item-color), transparent 28%), transparent 46%);
      mix-blend-mode: screen;
      opacity: 0.45;
      pointer-events: none;
    }

    .future-btn:hover,
    .future-btn:focus-visible {
      transform: translateY(-16px) scale(1.045);
      border-color: color-mix(in srgb, var(--item-color), #ffffff 45%);
      box-shadow:
        0 36px 90px rgba(0, 0, 0, 0.56),
        0 0 70px color-mix(in srgb, var(--item-color), transparent 34%);
      z-index: 10;
      filter: saturate(1.08) contrast(1.04);
    }

    .future-btn:hover::before,
    .future-btn:focus-visible::before {
      transform: scale(1.1);
      filter: saturate(1.22) contrast(1.08);
    }

    .future-btn-content {
      position: absolute;
      z-index: 2;
      left: 16px;
      right: 16px;
      bottom: 16px;
      min-height: 150px;
      padding: 18px 16px 16px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 10px;
      border-radius: 20px;
      background:
        linear-gradient(180deg,
          rgba(0, 0, 0, 0.18) 0%,
          rgba(0, 0, 0, 0.66) 42%,
          rgba(0, 0, 0, 0.88) 100%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(2px);
    }

    .future-btn strong,
    .future-btn span {
      position: static;
      display: block;
      margin: 0;
      text-shadow: 0 8px 26px rgba(0, 0, 0, 0.8);
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .future-btn strong {
      font-size: clamp(1.1rem, 1.5vw, 1.55rem);
      line-height: 1.12;
      letter-spacing: -0.045em;
    }

    .future-btn span {
      color: rgba(255, 255, 255, 0.82);
      font-size: clamp(0.78rem, 0.95vw, 0.92rem);
      line-height: 1.45;
    }

    @media (max-width: 980px) {
      .future-list {
        overflow-y: auto;
        align-content: start;
      }

      .future-buttons {
        height: auto;
        grid-template-columns: repeat(2, minmax(140px, 1fr));
      }

      .future-btn {
        min-height: 380px;
      }
    }

    @media (max-width: 560px) {
      .future-buttons {
        grid-template-columns: 1fr;
      }

      .future-btn {
        min-height: 360px;
      }
    }

    .flash-image {
      position: fixed;
      inset: 50% auto auto 50%;
      z-index: 20;
      width: 180px;
      height: 120px;
      border-radius: 22px;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.2);
      pointer-events: none;
      box-shadow: 0 0 0 999vmax rgba(0, 0, 0, 0);
    }

    .flash-image.active {
      animation: coverScreen 1100ms var(--ease) forwards;
    }

    @keyframes coverScreen {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.2); border-radius: 22px; }
      20% { opacity: 1; }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(14); border-radius: 0; }
    }

    .closing-mask {
      position: fixed;
      inset: 0;
      z-index: 30;
      background: #000;
      transform: scale(1);
      opacity: 0;
      pointer-events: none;
    }

    .closing-mask.active {
      opacity: 1;
      animation: shrinkBlack 1700ms var(--ease) 3200ms forwards;
    }

    @keyframes shrinkBlack {
      to { transform: scale(0); border-radius: 999px; }
    }
  </style>
<script type="text/javascript" nonce="448d80bceca54d7c9077e88f5ad" src="//local.adguard.org?ts=1779925450826&amp;type=content-script&amp;dmn=chatgpt.com&amp;url=https%3A%2F%2Fchatgpt.com%2Fbackend-api%2Festuary%2Fcontent%3Fid%3Dfile_000000006e407206ab55e5265c284910%26fn%3Dindex_text_overlap_fixed.html%26cd%3Dattachment%26ts%3D494424%26p%3Dfs%26cid%3D1%26sig%3D6d3ba7512cf46fd24fa840fb24533ac0ab3b3ca112654737e216ec4d12b039e8%26v%3D0&amp;app=chrome.exe&amp;css=3&amp;js=1&amp;rel=1&amp;rji=1&amp;sbe=0&amp;stealth=1&amp;st-wrtc&amp;st-push&amp;st-loc&amp;st-dnt"></script><script type="text/javascript" nonce="448d80bceca54d7c9077e88f5ad" src="//local.adguard.org?ts=1779925450826&amp;name=AdGuard%20Extra&amp;name=AdGuard%20Popup%20Blocker&amp;type=user-script"></script></head>
<body>

  </main>

    function setBlackMode() {
      document.body.style.background = "#000";
      document.body.style.color = "#fff";
      stage.classList.add("active");
      stage.setAttribute("aria-hidden", "false");
    }

    function setImageBackground(element, item, useChanged = false) {
      const fallback = useChanged ? item.changed : item.fallback;
      element.style.backgroundImage = `url('${item.image}'), ${fallback}`;
    }

    function getResultForSelectedSpace(future) {
      const spaceKey = selectedCategory ? selectedCategory.key : "city";
      const resultImage = future.resultImages?.[spaceKey] || future.image;
      const resultDescription = future.resultText?.[spaceKey] || future.concept;

      return {
        image: resultImage,
        fallback: future.changed,
        changed: future.changed,
        description: resultDescription
      };
    }

    function clearStage() {
      textBox.textContent = "";
      subText.textContent = "";
      choiceRow.innerHTML = "";
      answerRow.innerHTML = "";
      currentImage.classList.add("hidden");
    }

    async function fadeTextOut() {
      textBox.classList.add("hidden");
      subText.classList.add("hidden");
      await sleep(650);
      textBox.textContent = "";
      subText.textContent = "";
      textBox.classList.remove("hidden");
      subText.classList.remove("hidden");
    }

    async function typeWriter(text, speed = 58) {
      textBox.textContent = "";
      for (const char of text) {
        textBox.textContent += char;
        await sleep(char === " " ? speed * 0.45 : speed);
      }
    }

    async function showButtons(target, items, className, onClick) {
      target.innerHTML = "";
      for (const item of items) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `${className} hidden`;
        btn.textContent = item.label;
        btn.addEventListener("click", () => onClick(item));
        target.appendChild(btn);
        await sleep(180);
        btn.classList.remove("hidden");
      }
    }

    async function startExperience() {
      if (isPlaying) return;
      isPlaying = true;

      const rect = startBtn.getBoundingClientRect();
      startBtn.style.width = `${rect.width}px`;
      startBtn.style.height = `${rect.height}px`;
      startBtn.textContent = "";
      home.style.opacity = "0";
      home.style.transform = "translateY(-20px) scale(0.98)";

      await sleep(30);
      startBtn.classList.add("expand");
      await sleep(1180);
      setBlackMode();

      await typeWriter("당신은 현대의 모습을 바꿀 수 있는 능력이 있습니다.");
      await sleep(900);
      await fadeTextOut();

      await typeWriter("어떤 현대의 모습을 보겠습니까?");
      await showButtons(choiceRow, categories, "choice-btn", selectCategory);
    }

    async function selectCategory(category) {
      if (!isPlaying) return;
      selectedCategory = category;
      choiceRow.innerHTML = "";
      await fadeTextOut();

      setImageBackground(currentImage, category);
      currentImage.classList.remove("hidden");
      await sleep(450);
      await typeWriter(`당신은 '${category.label}'에 대한 이미지를 골랐습니다.`, 45);
      subText.textContent = category.guide + "\n이제 이 현대의 장면에 적용할 미래의 변화를 선택하세요.";
      await sleep(2200);

      currentImage.classList.add("hidden");
      await fadeTextOut();
      await typeWriter("어떤 변화가 생긴 미래를 현대에 적용하시겠습니까?", 48);
      await sleep(1000);
      await fadeTextOut();
      showFutureList();
    }

    function showFutureList() {
      clearStage();
      futureButtons.innerHTML = "";
      futures.forEach((future, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "future-btn";
        btn.style.setProperty("--item-color", future.color);
        btn.style.setProperty("--thumb", `url('${future.image}')`);
        btn.style.transitionDelay = `${index * 80}ms`;
        btn.innerHTML = `<div class="future-btn-content"><strong>${future.title}</strong><span>${future.concept}</span></div>`;
        btn.addEventListener("click", () => applyFuture(future));
        futureButtons.appendChild(btn);
      });
      futureList.classList.add("active");
      futureList.setAttribute("aria-hidden", "false");
    }

    async function applyFuture(future) {
      futureList.classList.remove("active");
      futureList.setAttribute("aria-hidden", "true");

      document.body.style.background = future.changed;
      flashImage.style.backgroundImage = `url('${future.image}'), ${future.changed}`;
      flashImage.classList.remove("active");
      void flashImage.offsetWidth;
      flashImage.classList.add("active");

      await sleep(1100);
      flashImage.classList.remove("active");
      clearStage();
      stage.classList.add("active");
      stage.setAttribute("aria-hidden", "false");

      setImageBackground(currentImage, future, true);
      currentImage.classList.remove("hidden");
      textBox.textContent = "이것이 당신이 바꾸신 미래입니다.";
      subText.textContent = `${selectedCategory ? selectedCategory.label : "현대"}의 모습이 '${future.title}'의 미장센과 미래 상상력으로 재구성되었습니다.\n다른 미래로 바꾸시겠습니까?`;
      showAnswerButtons();
    }

    function showAnswerButtons() {
      answerRow.innerHTML = "";
      const yes = document.createElement("button");
      const no = document.createElement("button");
      yes.type = "button";
      no.type = "button";
      yes.className = "answer-btn";
      no.className = "answer-btn";
      yes.textContent = "네";
      no.textContent = "아니요";
      yes.addEventListener("click", async () => {
        clearStage();
        document.body.style.background = "#000";
        showFutureList();
      });
      no.addEventListener("click", endExperience);
      answerRow.append(yes, no);
    }

    async function endExperience() {
      clearStage();
      document.body.style.background = "#000";
      await typeWriter("미래는 언제나 바뀔 수 있으며\n당신은 디지털 인문학을 통해 분석 및 해석할 수 있습니다.", 50);
      await sleep(1000);
      await fadeTextOut();
      await typeWriter("감사합니다.", 70);

      closingMask.classList.add("active");
      await sleep(4800);
      resetExperience();
    }

    function resetExperience() {
      selectedCategory = null;
      isPlaying = false;
      clearStage();
      stage.classList.remove("active");
      stage.setAttribute("aria-hidden", "true");
      futureList.classList.remove("active");
      futureList.setAttribute("aria-hidden", "true");
      closingMask.classList.remove("active");
      closingMask.style.animation = "none";
      void closingMask.offsetWidth;
      closingMask.style.animation = "";
      startBtn.classList.remove("expand");
      startBtn.removeAttribute("style");
      startBtn.textContent = "시작하기";
      home.removeAttribute("style");
      document.body.style.background = "#fff";
      document.body.style.color = "#111";
    }

    startBtn.addEventListener("click", startExperience);
  </script>
</body>
</html>
