<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>디지털 인문학 미래 예측</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #111111;
      --accent: #111111;
      --panel: rgba(255, 255, 255, 0.08);
      --line: rgba(255, 255, 255, 0.25);
      --ease: cubic-bezier(0.7, 0, 0.3, 1);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: Pretendard, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
    }

    body {
      display: grid;
      place-items: center;
      transition: background 900ms var(--ease), color 500ms ease;
    }

    button {
      font: inherit;
      cursor: pointer;
      border: 0;
    }

    .hidden {
      opacity: 0 !important;
      pointer-events: none !important;
      transform: translateY(16px) scale(0.98) !important;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      isolation: isolate;
    }

    .home {
      position: relative;
      z-index: 3;
      width: min(92vw, 920px);
      text-align: center;
      transition: opacity 600ms ease, transform 600ms ease;
    }

    .home h1 {
      margin: 0 0 36px;
      font-size: clamp(2.4rem, 8vw, 6.8rem);
      line-height: 1.05;
      letter-spacing: -0.06em;
      word-break: keep-all;
    }

    .start-btn {
      min-width: 168px;
      min-height: 68px;
      padding: 18px 44px;
      border-radius: 999px;
      background: #000;
      color: #fff;
      font-size: clamp(1rem, 2vw, 1.35rem);
      transition: transform 1500ms var(--ease), border-radius 800ms var(--ease), opacity 500ms ease;
      will-change: transform;
    }

    .start-btn.expand {
      transform: scale(90);
      border-radius: 0;
      pointer-events: none;
    }

    .stage {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: grid;
      place-items: center;
      padding: 40px 24px;
      color: #fff;
      text-align: center;
      pointer-events: none;
    }

    .stage.active { pointer-events: auto; }

    .text-box {
      width: min(92vw, 980px);
      min-height: 1.4em;
      font-size: clamp(1.8rem, 4.2vw, 4.2rem);
      line-height: 1.35;
      font-weight: 750;
      letter-spacing: -0.04em;
      word-break: keep-all;
      white-space: pre-line;
      text-shadow: 0 10px 34px rgba(0, 0, 0, 0.45);
      transition: opacity 700ms ease, transform 700ms ease;
    }



    .type-char {
      display: inline-block;
      opacity: 0;
      transform: translateY(18px) scale(0.86);
      animation: charPop 360ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .sub-text.reveal {
      animation: subReveal 720ms ease forwards;
    }

    @keyframes charPop {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes subReveal {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .text-box.single-line-title {
      width: max-content;
      max-width: 96vw;
      white-space: nowrap;
      word-break: keep-all;
      overflow: visible;
      font-size: clamp(1.35rem, 2.8vw, 3.1rem);
      line-height: 1.2;
    }

    .text-box.future-question-line {
      font-size: clamp(1.2rem, 2.45vw, 2.75rem);
      max-width: 98vw;
      white-space: nowrap;
      word-break: keep-all;
      letter-spacing: -0.06em;
    }

    .future-title h2 {
      white-space: nowrap;
      word-break: keep-all;
      letter-spacing: -0.055em;
      font-size: clamp(1.55rem, 3.3vw, 4.25rem);
    }


    .text-box.image-choice-caption {
      width: max-content;
      max-width: 96vw;
      margin: 22px auto 0;
      padding: clamp(12px, 1.7vw, 20px) clamp(24px, 3vw, 44px);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.48);
      color: #fff;
      font-size: clamp(1.25rem, 2.6vw, 2.9rem);
      line-height: 1.15;
      font-weight: 750;
      letter-spacing: -0.045em;
      white-space: nowrap;
      text-align: center;
      text-shadow: 0 8px 28px rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      box-shadow: 0 18px 52px rgba(0, 0, 0, 0.35);
    }

    .sub-text {
      margin-top: 18px;
      color: rgba(255, 255, 255, 0.72);
      font-size: clamp(0.98rem, 1.8vw, 1.25rem);
      line-height: 1.7;
      word-break: keep-all;
      white-space: pre-line;
    }

    .sub-text.single-line {
      width: max-content;
      max-width: 96vw;
      margin: 18px auto 0;
      padding: 14px 24px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.38);
      color: rgba(255, 255, 255, 0.86);
      font-size: clamp(0.78rem, 1.18vw, 1.05rem);
      line-height: 1.25;
      white-space: nowrap;
      overflow: visible;
      backdrop-filter: blur(10px);
    }

    .choice-row,
    .answer-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 34px;
    }

    .choice-btn,
    .answer-btn {
      min-width: 138px;
      padding: 16px 28px;
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 999px;
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      transition: opacity 500ms ease, transform 500ms ease, background 300ms ease, border-color 300ms ease;
    }

    .choice-btn:hover,
    .answer-btn:hover {
      transform: translateY(-4px);
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.9);
    }

    .current-image,
    .future-image {
      position: relative;
      width: min(94vw, 1120px);
      height: min(58vh, 580px);
      margin: 0 auto 24px;
      border-radius: 28px;
      background-size: cover;
      background-position: center;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
      transition: opacity 700ms ease, transform 700ms ease;
    }

    .current-image.with-center-caption::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0.44));
      pointer-events: none;
    }

    .current-image.with-center-caption::after {
      content: attr(data-caption);
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: max-content;
      max-width: 94%;
      padding: clamp(14px, 2vw, 22px) clamp(22px, 3vw, 42px);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.48);
      color: #fff;
      font-size: clamp(1.25rem, 3vw, 3.2rem);
      line-height: 1.15;
      font-weight: 750;
      letter-spacing: -0.045em;
      white-space: nowrap;
      text-align: center;
      text-shadow: 0 8px 28px rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      box-shadow: 0 18px 52px rgba(0, 0, 0, 0.35);
    }

    .current-image.hidden,
    .future-image.hidden {
      display: none;
    }

    .future-list {
      position: fixed;
      inset: 0;
      z-index: 8;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: clamp(18px, 3vw, 36px);
      align-items: center;
      padding: clamp(22px, 4vw, 58px);
      color: #fff;
      pointer-events: none;
      opacity: 0;
      transform: translateY(22px);
      transition: opacity 700ms ease, transform 700ms ease;
    }

    .future-list.active {
      pointer-events: auto;
      opacity: 1;
      transform: translateY(0);
    }

    .future-title {
      width: min(1100px, 94vw);
      margin: 0 auto;
      text-align: center;
    }

    .future-title h2 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 5vw, 4.8rem);
      line-height: 1.05;
      letter-spacing: -0.06em;
    }

    .future-title p {
      margin: 0 auto;
      max-width: 720px;
      color: rgba(255, 255, 255, 0.68);
      font-size: clamp(1rem, 1.6vw, 1.16rem);
      line-height: 1.65;
      word-break: keep-all;
    }

    /* 영화 선택 버튼: 세로로 길쭉한 스틸컷 카드 */
    .future-buttons {
      width: min(1240px, 94vw);
      height: min(64vh, 650px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(5, minmax(150px, 1fr));
      gap: clamp(18px, 2vw, 30px);
      align-items: stretch;
      perspective: 1200px;
    }

    .future-btn {
      --item-color: #555;
      position: relative;
      height: 100%;
      min-height: 450px;
      padding: 0;
      overflow: visible;
      border: 0;
      border-radius: 30px;
      text-align: left;
      color: #fff;
      background:
        linear-gradient(180deg,
          color-mix(in srgb, var(--item-color), #ffffff 12%) 0%,
          color-mix(in srgb, var(--item-color), #000000 42%) 48%,
          #050505 100%);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.42);
      transition:
        transform 480ms var(--ease),
        box-shadow 340ms ease,
        filter 340ms ease,
        opacity 340ms ease;
    }

    .future-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background-image:
        linear-gradient(180deg, rgba(0, 0, 0, 0.04) 0%, rgba(0, 0, 0, 0.12) 46%, rgba(0, 0, 0, 0.74) 100%),
        var(--thumb),
        linear-gradient(135deg, var(--item-color), #111);
      background-size: cover;
      background-position: center;
      transform: scale(1);
      transition: transform 520ms var(--ease), filter 340ms ease;
    }

    .future-btn::after {
      content: "";
      position: absolute;
      inset: -16px;
      border-radius: 38px;
      background:
        radial-gradient(circle at 50% 8%, color-mix(in srgb, var(--item-color), transparent 30%), transparent 42%),
        linear-gradient(90deg,
          transparent 0%,
          color-mix(in srgb, var(--item-color), transparent 34%) 18%,
          color-mix(in srgb, var(--item-color), transparent 64%) 50%,
          color-mix(in srgb, var(--item-color), transparent 34%) 82%,
          transparent 100%);
      opacity: 0;
      filter: blur(14px);
      pointer-events: none;
      transition: opacity 340ms ease, filter 340ms ease;
      z-index: -1;
    }

    .future-buttons:hover .future-btn,
    .future-buttons:focus-within .future-btn {
      opacity: 0.42;
      filter: brightness(0.6) saturate(0.65) contrast(0.95);
    }

    .future-buttons .future-btn:hover,
    .future-buttons .future-btn:focus-visible {
      opacity: 1;
      transform: translateY(-18px) scale(1.055);
      box-shadow:
        0 40px 100px rgba(0, 0, 0, 0.66),
        0 0 18px color-mix(in srgb, var(--item-color), #ffffff 28%),
        0 0 42px color-mix(in srgb, var(--item-color), transparent 10%),
        0 0 90px color-mix(in srgb, var(--item-color), transparent 36%);
      z-index: 10;
      filter: brightness(1.12) saturate(1.24) contrast(1.08);
    }

    .future-btn:hover::before,
    .future-btn:focus-visible::before {
      transform: scale(1.08);
      filter: saturate(1.3) contrast(1.1);
    }

    .future-btn:hover::after,
    .future-btn:focus-visible::after {
      opacity: 1;
      filter: blur(18px);
    }

    .future-btn-content {
      position: absolute;
      z-index: 2;
      left: 16px;
      right: 16px;
      bottom: 16px;
      min-height: 150px;
      padding: 18px 16px 16px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 10px;
      border-radius: 20px;
      background:
        linear-gradient(180deg,
          rgba(0, 0, 0, 0.18) 0%,
          rgba(0, 0, 0, 0.66) 42%,
          rgba(0, 0, 0, 0.88) 100%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(2px);
    }

    .future-btn strong,
    .future-btn span {
      position: static;
      display: block;
      margin: 0;
      text-shadow: 0 8px 26px rgba(0, 0, 0, 0.8);
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .future-btn strong {
      font-size: clamp(1.1rem, 1.5vw, 1.55rem);
      line-height: 1.12;
      letter-spacing: -0.045em;
    }

    .future-btn span {
      color: rgba(255, 255, 255, 0.82);
      font-size: clamp(0.78rem, 0.95vw, 0.92rem);
      line-height: 1.45;
    }

    .future-tags {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      margin-top: 2px;
    }

    .future-tag {
      display: block;
      width: fit-content;
      max-width: 100%;
      padding: 5px 10px;
      border-radius: 999px;
      color: rgba(255, 255, 255, 0.92);
      font-size: clamp(0.72rem, 0.86vw, 0.86rem);
      line-height: 1.15;
      letter-spacing: -0.02em;
      background: color-mix(in srgb, var(--item-color), rgba(0, 0, 0, 0.42) 58%);
      box-shadow: 0 0 14px color-mix(in srgb, var(--item-color), transparent 50%);
      text-shadow: 0 6px 18px rgba(0, 0, 0, 0.72);
      white-space: nowrap;
    }

    @media (max-width: 980px) {
      .future-list {
        overflow-y: auto;
        align-content: start;
      }

      .future-buttons {
        height: auto;
        grid-template-columns: repeat(2, minmax(140px, 1fr));
      }

      .future-btn {
        min-height: 380px;
      }
    }

    @media (max-width: 560px) {
      .future-buttons {
        grid-template-columns: 1fr;
      }

      .future-btn {
        min-height: 360px;
      }
    }


    .result-scene {
      position: fixed;
      inset: 0;
      z-index: 18;
      opacity: 0;
      pointer-events: none;
      background-image: var(--result-bg);
      background-size: cover;
      background-position: center;
      transition: opacity 760ms ease;
      color: #fff;
    }

    .result-scene.active {
      opacity: 1;
      pointer-events: auto;
    }

    .result-scene::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.14);
      opacity: 1;
      transition: opacity 720ms ease;
    }

    .result-scene.panel-open::before {
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.86) 0%, rgba(0, 0, 0, 0.68) 22%, rgba(0, 0, 0, 0.28) 48%, rgba(0, 0, 0, 0.04) 100%);
    }

    .result-panel {
      position: absolute;
      left: clamp(28px, 6vw, 92px);
      top: 50%;
      width: min(560px, 42vw);
      transform: translateY(-46%) translateX(-34px);
      opacity: 0;
      padding: clamp(24px, 3.2vw, 48px);
      border-radius: 30px;
      background: linear-gradient(135deg, rgba(255,255,255,0.14), rgba(255,255,255,0.04));
      backdrop-filter: blur(14px);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.52);
      transition: opacity 720ms ease, transform 720ms var(--ease);
    }

    .result-panel.active {
      opacity: 1;
      transform: translateY(-50%) translateX(0);
    }

    .result-panel .eyebrow {
      margin: 0 0 18px;
      color: rgba(255,255,255,0.68);
      font-size: clamp(0.82rem, 1vw, 1rem);
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .result-panel h2 {
      margin: 0 0 22px;
      font-size: clamp(2rem, 4.5vw, 4.7rem);
      line-height: 1.05;
      letter-spacing: -0.06em;
      word-break: keep-all;
    }

    .result-panel p {
      margin: 0;
      color: rgba(255,255,255,0.86);
      font-size: clamp(0.96rem, 1.3vw, 1.2rem);
      line-height: 1.85;
      word-break: keep-all;
      white-space: pre-line;
    }

    .movie-info {
      position: fixed;
      inset: 0;
      z-index: 19;
      display: grid;
      place-items: center;
      padding: clamp(28px, 5vw, 72px);
      opacity: 0;
      pointer-events: none;
      color: #111;
      background: #d7d7d7;
      transition: opacity 720ms ease;
    }

    .movie-info.active {
      opacity: 1;
      pointer-events: auto;
    }

    .movie-info-grid {
      width: min(1180px, 92vw);
      min-height: min(620px, 76vh);
      display: grid;
      grid-template-columns: minmax(220px, 0.9fr) minmax(320px, 1.35fr);
      gap: clamp(28px, 5vw, 72px);
      align-items: center;
    }

    .movie-poster {
      width: 100%;
      aspect-ratio: 2 / 3;
      border-radius: 4px;
      background-image: var(--poster-bg);
      background-size: cover;
      background-position: center;
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.28);
    }

    .movie-copy h2 {
      margin: 0 0 16px;
      font-size: clamp(2rem, 4vw, 4.8rem);
      line-height: 1.05;
      letter-spacing: -0.06em;
      word-break: keep-all;
    }

    .movie-copy .movie-concept {
      margin: 0 0 26px;
      color: rgba(0, 0, 0, 0.58);
      font-size: clamp(1rem, 1.25vw, 1.18rem);
      line-height: 1.7;
      word-break: keep-all;
    }

    .movie-detail-block {
      margin-top: 24px;
    }

    .movie-detail-block h3 {
      margin: 0 0 10px;
      font-size: clamp(1rem, 1.4vw, 1.25rem);
    }

    .movie-detail-block p {
      margin: 0;
      color: rgba(0, 0, 0, 0.72);
      font-size: clamp(0.9rem, 1.12vw, 1.05rem);
      line-height: 1.78;
      word-break: keep-all;
    }

    .ott-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
      padding: 0;
      list-style: none;
    }

    .ott-list li {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.58);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08);
      color: rgba(0,0,0,0.76);
      font-size: 0.92rem;
    }

    .movie-answer-row {
      justify-content: flex-start;
      margin-top: 34px;
    }

    .movie-answer-row .answer-btn {
      color: #111;
      border-color: rgba(0,0,0,0.2);
      background: rgba(255,255,255,0.54);
    }

    .movie-answer-row .answer-btn:hover {
      border-color: rgba(0,0,0,0.7);
      background: rgba(255,255,255,0.88);
    }

    @media (max-width: 840px) {
      .result-panel {
        left: 50%;
        width: min(88vw, 560px);
        transform: translate(-50%, -46%);
      }

      .result-panel.active {
        transform: translate(-50%, -50%);
      }

      .movie-info {
        overflow-y: auto;
        place-items: start center;
      }

      .movie-info-grid {
        grid-template-columns: 1fr;
        min-height: 0;
      }

      .movie-poster {
        width: min(320px, 72vw);
        margin: 0 auto;
      }
    }

    .flash-image {
      position: fixed;
      inset: 50% auto auto 50%;
      z-index: 20;
      width: 180px;
      height: 120px;
      border-radius: 22px;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.2);
      pointer-events: none;
      box-shadow: 0 0 0 999vmax rgba(0, 0, 0, 0);
    }

    .flash-image.active {
      animation: coverScreen 1100ms var(--ease) forwards;
    }

    @keyframes coverScreen {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.2); border-radius: 22px; }
      20% { opacity: 1; }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(14); border-radius: 0; }
    }

    .closing-mask {
      position: fixed;
      inset: 0;
      z-index: 30;
      background: #000;
      transform: scale(1);
      opacity: 0;
      pointer-events: none;
    }

    .closing-mask.active {
      opacity: 1;
      animation: shrinkBlack 1500ms var(--ease) 500ms forwards;
    }

    @keyframes shrinkBlack {
      to { transform: scale(0); border-radius: 999px; }
    }



    #textBox.small-title {
      min-height: 0;
      margin-bottom: 0;
    }

    #subText.essay-text {
      max-width: 760px;
      margin: 0 auto;
      color: rgba(255, 255, 255, 0.86);
      font-size: clamp(0.9rem, 1.35vw, 1.08rem);
      line-height: 2.05;
      letter-spacing: -0.02em;
      white-space: pre-line;
    }

    .next-btn {
      position: fixed;
      right: clamp(22px, 4vw, 54px);
      bottom: clamp(22px, 4vw, 54px);
      z-index: 40;
      width: 66px;
      height: 66px;
      border-radius: 999px;
      color: #fff;
      background: rgba(255, 255, 255, 0.11);
      border: 1px solid rgba(255, 255, 255, 0.36);
      backdrop-filter: blur(12px);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.36);
      display: grid;
      place-items: center;
      opacity: 0;
      transform: translateY(14px) scale(0.94);
      pointer-events: none;
      transition: opacity 320ms ease, transform 320ms ease, background 260ms ease, border-color 260ms ease;
    }

    .next-btn.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .next-btn:hover,
    .next-btn:focus-visible {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.9);

    function appendPopChar(target, char) {
      if (char === "\n") {
        target.appendChild(document.createElement("br"));
        return;
      }

      if (char === " ") {
        target.appendChild(document.createTextNode(" "));
        return;
      }

      const span = document.createElement("span");
      span.className = "type-char";
      span.textContent = char;
      target.appendChild(span);
    }

    async function typeWriter(text, speed = 58, target = textBox) {
      const controller = { skip: false };
      typingController = controller;
      target.innerHTML = "";

      for (const char of text) {
        if (controller.skip) {
          target.textContent = text;
          break;
        }

        appendPopChar(target, char);
        await sleep(char === " " ? speed * 0.45 : speed);
      }

      if (typingController === controller) typingController = null;
    }

    function showTitlePage(title, body, bodyOnly = false) {
      textBox.textContent = title;
      subText.textContent = body;
      textBox.classList.toggle("small-title", bodyOnly);
      subText.classList.toggle("essay-text", bodyOnly);
    }

    async function showTypingTitlePage(title, body) {
      textBox.classList.remove("small-title", "hidden");
      textBox.classList.add("single-line-title");
      subText.classList.remove("essay-text", "single-line", "hidden", "reveal");
      subText.textContent = "";
      subText.style.opacity = "0";

      await typeWriter(title, 70, textBox);

      subText.textContent = body;
      subText.classList.add("reveal");
      subText.style.opacity = "";
    }

    async function showButtons(target, items, className, onClick) {
      target.innerHTML = "";
      for (const item of items) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `${className} hidden`;
        btn.textContent = item.label;
        btn.addEventListener("click", () => onClick(item));
        target.appendChild(btn);
        await sleep(180);
        btn.classList.remove("hidden");
      }
    }

    async function startExperience() {
      if (isPlaying) return;
      isPlaying = true;

      const rect = startBtn.getBoundingClientRect();
      startBtn.style.width = `${rect.width}px`;
      startBtn.style.height = `${rect.height}px`;
      startBtn.textContent = "";
      home.style.opacity = "0";
      home.style.transform = "translateY(-20px) scale(0.98)";

      await sleep(30);
      startBtn.classList.add("expand");
      await sleep(1180);
      setBlackMode();

      await showTypingTitlePage(
        "우리는 어떤 시대를 살아가고 있을까?",
        "기술은 인간의 삶을 변화시키고\n환경은 점점 소모되어가며\n인간은 이전과 다른 방식으로 관계를 맺기 시작했습니다."
      );
      await waitForNext();
      await fadeTextOut();

      await showTitlePage(
        "",
        "영화는 오래전부터 변화의 끝에 존재할 미래를 상상해왔습니다.\n\n미래를 다룬 영화들은 공상과 예측의 발명이 아니라\n그 시대의 불안과 욕망, 인간성에 대한 질문을 담아낸 인문학적 기록입니다.\n\n우리는 영화가 보여준 미래 사회를 통해\n현재 우리가 살아가는 시대의 방향성과 인간의 선택을 다시 바라보고자 합니다.",
        true
      );
      await waitForNext();
      await fadeTextOut();

      await typeWriter("당신이 바라본 현대의 풍경은?");
      await showButtons(choiceRow, categories, "choice-btn", selectCategory);
    }

    async function selectCategory(category) {
      if (!isPlaying) return;
      selectedCategory = category;
      choiceRow.innerHTML = "";
      await fadeTextOut();

      setImageBackground(currentImage, category);
      currentImage.classList.remove("hidden");
      currentImage.classList.remove("with-center-caption");
      currentImage.removeAttribute("data-caption");
      await sleep(450);

      textBox.classList.add("image-choice-caption");
      textBox.textContent = `당신은 '${category.label}'의 풍경을 선택했습니다.`;
      subText.classList.add("single-line");
      subText.textContent = category.guide + " 이제 이 현대의 장면에 적용할 미래의 변화를 선택하세요.";
      await waitForNext();

      currentImage.classList.add("hidden");
      currentImage.classList.remove("with-center-caption");
      currentImage.removeAttribute("data-caption");
      await fadeTextOut();
      textBox.classList.add("single-line-title", "future-question-line");
      await typeWriter("미래를 바라보는 관점을 선택해주세요.", 48);
      await waitForNext();
      await fadeTextOut();
      showFutureList();
    }

    function showFutureList() {
      resultFlowToken++;
      hideResultScene();
      hideMovieInfo();
      hideAllNavigationButtons();
      document.body.style.background = "#000";
      clearStage();
      futureButtons.innerHTML = "";
      futures.forEach((future, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "future-btn";
        btn.style.setProperty("--item-color", future.color);
        btn.style.setProperty("--thumb", `url('${future.image}')`);
        btn.style.transitionDelay = `${index * 80}ms`;
        const tags = (future.tags || []).slice(0, 3)
          .map((tag) => `<span class="future-tag">${tag}</span>`)
          .join("");
        btn.innerHTML = `<div class="future-btn-content"><strong>${future.title}</strong><div class="future-tags">${tags}</div></div>`;
        btn.addEventListener("click", () => applyFuture(future));
        futureButtons.appendChild(btn);
      });
      futureList.classList.add("active");
      futureList.setAttribute("aria-hidden", "false");
    }

    function goBackToFutureList() {
      resultFlowToken++;
      nextResolver = null;
      hideAllNavigationButtons();
      hideResultScene();
      hideMovieInfo();
      clearStage();
      showFutureList();
    }

    async function applyFuture(future) {
      const token = ++resultFlowToken;
      futureList.classList.remove("active");
      futureList.setAttribute("aria-hidden", "true");
      hideResultScene();
      hideMovieInfo();
      clearStage();

      const result = getResultForSelectedSpace(future);
      document.body.style.background = "#000";
      resultScene.style.setProperty("--result-bg", `url('${result.image}'), ${future.changed}`);
      resultScene.classList.add("active");
      resultScene.setAttribute("aria-hidden", "false");
      resultPanel.classList.remove("active");
      showBackButton();

      await sleep(260);
      if (token !== resultFlowToken) return;
      await waitForNext();
      if (token !== resultFlowToken) return;

      resultTitle.textContent = future.title;
      resultDescription.textContent = `${selectedCategory ? selectedCategory.label : "현대"}의 풍경이 '${future.title}'의 미래 관점으로 재해석되었습니다.

${result.description}`;
      resultScene.classList.add("panel-open");
      await sleep(80);
      if (token !== resultFlowToken) return;
      resultPanel.classList.add("active");
      showBackButton();

      await waitForNext();
      if (token !== resultFlowToken) return;
      await showMovieInfo(future);
    }

    async function showMovieInfo(future) {
      hideResultScene();
      hideNextButton();
      movieTitle.textContent = future.title;
      movieConcept.textContent = future.concept;
      moviePlot.textContent = future.plot || "줄거리 정보를 입력하세요.";
      moviePoster.style.setProperty("--poster-bg", `url('${future.poster || future.image}'), linear-gradient(135deg, ${future.color}, #111)`);
      ottList.innerHTML = "";
      (future.ott || ["OTT 정보 입력"]).forEach((item) => {
        const li = document.createElement("li");
        li.textContent = item;
        ottList.appendChild(li);
      });

      if (movieAnswerRow) {
        movieAnswerRow.innerHTML = "";
        movieAnswerRow.setAttribute("aria-hidden", "true");
      }

      movieInfo.classList.add("active");
      movieInfo.setAttribute("aria-hidden", "false");
      hideNextButton();
      showBackButton();
      showRefreshButton();
    }

    async function endExperience() {
      clearStage();
      document.body.style.background = "#000";
      await typeWriter("미래는 언제나 바뀔 수 있으며\n당신은 디지털 인문학을 통해 분석 및 해석할 수 있습니다.", 50);
      await waitForNext();
      await fadeTextOut();
      await typeWriter("감사합니다.", 70);
      await waitForNext();

      closingMask.classList.add("active");
      await sleep(2100);
      resetExperience();
    }

    function resetExperience() {
      selectedCategory = null;
      isPlaying = false;
      hideAllNavigationButtons();
      nextResolver = null;
      clearStage();
      stage.classList.remove("active");
      stage.setAttribute("aria-hidden", "true");
      futureList.classList.remove("active");
      futureList.setAttribute("aria-hidden", "true");
      hideResultScene();
      hideMovieInfo();
      closingMask.classList.remove("active");
      closingMask.style.animation = "none";
      void closingMask.offsetWidth;
      closingMask.style.animation = "";
      startBtn.classList.remove("expand");
      startBtn.removeAttribute("style");
      startBtn.textContent = "시작하기";
      home.removeAttribute("style");
      document.body.style.background = "#fff";
      document.body.style.color = "#111";
    }

    startBtn.addEventListener("click", startExperience);
  </script>
</body>
</html>
